name: DREAM World Observatory

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1, token: ${{ secrets.GITHUB_TOKEN }} }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install numpy scipy
      - name: Fetch world snapshot
        run: python scripts/world_fetch.py
      - name: Commit if changed
        run: |
          git config user.name "dream-bot"
          git config user.email "dream-bot@users.noreply.github.com"
          git add data/derived/world_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "world: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
